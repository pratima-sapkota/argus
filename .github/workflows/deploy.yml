name: Deploy to Cloud Run

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Submit Cloud Build
        working-directory: argus-incident-responder
        env:
          FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: |
          gcloud builds submit \
            --config=cloudbuild.yaml \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --suppress-logs \
            --substitutions="_VITE_FIREBASE_API_KEY=${FIREBASE_API_KEY},_VITE_FIREBASE_AUTH_DOMAIN=${FIREBASE_AUTH_DOMAIN},_VITE_FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID},_VITE_FIREBASE_APP_ID=${FIREBASE_APP_ID}"
